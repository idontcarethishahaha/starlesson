spring:
  cloud:
    nacos:
      server-addr: 192.168.227.128:8848 # nacos注册中心
      username: nacos
      password: nacos
      discovery:
        namespace: star-lesson-dev
        group: sl-group
        ip: 192.168.29.1
      config:
        namespace: star-lesson-dev
        group: sl-group
        file-extension: yaml
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml # 导入本服务的配置
      - optional:nacos:shared-spring.yaml # 共享spring配置
      - optional:nacos:shared-redis.yaml # 共享redis配置
      - optional:nacos:shared-mybatis.yaml # 共享mybatis配置
      - optional:nacos:shared-logs.yaml # 共享日志配置
      - optional:nacos:shared-feign.yaml # 共享feign配置
      - optional:nacos:shared-mq.yaml # 共享mq配置
      - optional:nacos:shared-xxljob.yaml # 共享mq配置
rocketmq:
  name-server: 192.168.227.128:9876
  producer:
    group: pay-service-producer
logging:
  level:
    com.tianji: debug
