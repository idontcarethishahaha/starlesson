server:
  port: 8095
  tomcat:
    uri-encoding: UTF-8
spring:
  profiles:
    active: dev
  application:
    name: chat-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        namespace: star-lesson-dev
        group: sl-group
      discovery:
        namespace: star-lesson-dev
        group: sl-group
        ip: 192.168.29.1
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:shared-spring.yaml
      - optional:nacos:shared-redis.yaml
      - optional:nacos:shared-mybatis.yaml
      - optional:nacos:shared-logs.yaml
      - optional:nacos:shared-feign.yaml
      - optional:nacos:shared-qdrant.yaml
      - optional:file:.env[.properties]
  # 本地关键配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.227.128:3306/tj_chat?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123
  data:
    redis:
      host: 192.168.227.128
      port: 6379
rocketmq:
  name-server: 192.168.227.128:9876
  producer:
    group: chat-service-producer
tj:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.tianji.chat.controller
    title: StarLesson星课堂 - AI智能对话中心接口文档
    description: 该服务提供AI聊天、AI知识库分析等功能
    contact-name: 研究院
    contact-url: http://www.itcast.cn/
    contact-email: 3269725546@qq.com
    version: v1.0
  jdbc:
    database: tj_chat
  auth:
    resource:
      enable: true
      excludeLoginPaths:
        - /chat/**
        - /session/**
        - /file/**
        - /knowledge/**
  mq:
    listener:
      retry:
        stateless: false
langchain4j:
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api-key: ${DASHSCOPE_API_KEY:}
  max-tokens: 2000
  timeout-seconds: 60
  model-name: qwen3-max
  embedding-model-name: text-embedding-v2
  max-retries: 3
  chat-model-temperature: 0.7
  streaming-chat-model-temperature: 0.7

# 本地 qdrant 向量数据库兜底配置（优先从 shared-qdrant.yaml 读取；读不到时使用下面默认值）
qdrant:
  host: 192.168.227.128
  port: 6334
  secure: false
